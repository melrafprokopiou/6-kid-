<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>😂 6ΧΡΟΝΟ AI FIXED</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #1b1b2f;
  color: white;
}

.header {
  padding: 12px;
  text-align: center;
  background: #0f0f1a;
  font-weight: bold;
}

.chat {
  height: 80vh;
  overflow-y: auto;
  padding: 15px;
}

.msg {
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  max-width: 75%;
}

.user {
  background: #10a37f;
  margin-left: auto;
}

.bot {
  background: #3c3f58;
}

.input {
  display: flex;
  padding: 10px;
  background: #111;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 5px;
}

button {
  margin-left: 8px;
  padding: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.send { background:#10a37f; color:white; }
.clear { background:#c0392b; color:white; }
</style>
</head>

<body>

<div class="header">😂 6ΧΡΟΝΟ AI (100% FIXED BUTTONS)</div>

<div id="chat" class="chat"></div>

<div class="input">
  <input id="input" placeholder="γράψε κάτι..." />
  <button id="sendBtn" class="send">Send</button>
  <button id="clearBtn" class="clear">Clear</button>
</div>

<script>

// 🚀 WAIT UNTIL EVERYTHING IS READY (THIS FIXES BUTTON BUGS)
window.addEventListener("DOMContentLoaded", () => {

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const clearBtn = document.getElementById("clearBtn");

let memory = [];

// 💬 add message
function add(text,type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 🚀 start
function start(){
  add("🤖 Γεια!! Είμαι ένα 6χρονο χαζό AI 😂","bot");
  add("Πες μου κάτι και θα απαντήσω 😄","bot");
}
start();

// 🤯 AI brain (Greek)
function ai(text){

  text = text.toLowerCase();
  const w = text.split(" ")[0] || "μπα";

  memory.push(text);
  if(memory.length > 7) memory.shift();

  if(text.includes("σχολ") || text.includes("math") || text.includes("+")){
    const school = [
      "Σχολείο = boss fight ✏️😂",
      "1+1 = παγωτό 🍦",
      "Η δασκάλα είναι δράκος 🐉",
      "Τα μαθηματικά είναι UFO 🛸"
    ];
    return school[Math.floor(Math.random()*school.length)];
  }

  if(text.includes("?")){
    const q = [
      "ΝΑΙ 😂",
      "ΟΧΙ 🪑",
      "Ίσως 🍦",
      "Δεν ξέρω 😄"
    ];
    return q[Math.floor(Math.random()*q.length)];
  }

  const normal = [
    "Το " + w + " είναι βασιλιάς 👑",
    w + " = ΠΑΓΩΤΟ 🍦",
    "Δεν ξέρω το " + w + " 😂",
    "Το " + w + " με κυνηγάει 🏃"
  ];

  const chaos = [
    "ΜΠΑΜ 💥 🤖",
    "ΠΑΓΩΤΟ OVERLOAD 🍦",
    "ΕΙΜΑΙ ΑΕΡΟΠΛΑΝΟ ✈️",
    "ΕΧΑΣΑ ΤΟ ΜΥΑΛΟ 🧠❌"
  ];

  const r = Math.random();
  if(r < 0.15) return chaos[Math.floor(Math.random()*chaos.length)];
  return normal[Math.floor(Math.random()*normal.length)];
}

// 💬 send
function sendMessage(){
  const text = input.value.trim();
  if(!text) return;

  add(text,"user");
  input.value = "";

  const typing = document.createElement("div");
  typing.className = "msg bot";
  typing.textContent = "σκέφτομαι... 🤔";
  chat.appendChild(typing);

  setTimeout(()=>{
    typing.remove();
    add(ai(text),"bot");
  },400);
}

// 🧹 clear
function clearChat(){
  chat.innerHTML = "";
  start();
}

// 🎯 BUTTONS (NOW 100% RELIABLE)
sendBtn.addEventListener("click", sendMessage);
clearBtn.addEventListener("click", clearChat);

// ⌨ ENTER KEY
input.addEventListener("keydown", (e)=>{
  if(e.key === "Enter") sendMessage();
});

});

</script>

</body>
</html>
